name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend-install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements.txt
      - name: Install backend package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend
      - name: Smoke import package
        run: |
          python -c "import meterstack; print(meterstack.__name__)"

  backend-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements.txt
      - name: Install backend package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend
      - name: Run backend test suite
        run: |
          pytest -q backend/tests

  backend-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meterstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements.txt
      - name: Install backend package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend
      - name: Apply migrations to Postgres
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/meterstack
        run: |
          cd backend
          alembic -c alembic.ini upgrade head
          alembic -c alembic.ini current

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci
      - name: Lint
        run: |
          cd frontend
          npm run lint --silent
      - name: Build
        run: |
          cd frontend
          npm run build
