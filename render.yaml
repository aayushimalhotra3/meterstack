services:
  - type: web
    name: meterstack-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: BILLING_MODE
        value: mock
      - key: SECRET_KEY
        sync: false
      - key: RATE_LIMIT_PER_MIN
        sync: false
  - type: web
    name: meterstack-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: npx serve -s frontend/dist -l 10000
    autoDeploy: true
databases:
  - name: meterstack-postgres
